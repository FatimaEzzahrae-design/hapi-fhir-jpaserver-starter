name: DevOps CI/CD Pipeline

# Déclenche le pipeline sur push ou PR vers master
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu

      - name: Build with Maven
        run: mvn -B clean package

      - name: Run Tests
        run: mvn test

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t fatimaezahraafras/hapi-fhir-jpaserver:latest .
      
      - name: Push Docker Image
        run: |
          docker push fatimaezahraafras/hapi-fhir-jpaserver:latest

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Déploiement automatique : adapter selon ton serveur cible
      - name: Deploy to Server
        run: |
          echo "Déploiement automatique de l'application..."
          # Exemple : ssh vers serveur et lancer docker run
          # ssh user@server "docker pull fatimaezahraafras/hapi-fhir-jpaserver:latest && docker stop hapi || true && docker rm hapi || true && docker run -d --name hapi -p 8080:8080 fatimaezahraafras/hapi-fhir-jpaserver:latest"