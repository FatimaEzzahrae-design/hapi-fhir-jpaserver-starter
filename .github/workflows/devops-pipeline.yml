name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

  security-scan:
    name: Docker Build, Trivy Scan & Security Metrics
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t fatimaezahraafras/hapi-fhir-jpaserver:latest .

      - name: Scan Docker image with Trivy (Security Gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fatimaezahraafras/hapi-fhir-jpaserver:latest
          severity: CRITICAL
          format: json
          output: trivy-report.json
          exit-code: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Update vulnerability history and MTTR
        run: |
          python .github/workflows/update_vuln_history.py trivy-report.json vuln_history.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-metrics
          path: |
            trivy-report.json
            vuln_history.json
            vuln_metrics.csv

      - name: Push Docker image
        run: docker push fatimaezahraafras/hapi-fhir-jpaserver:latest

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deployment step
        run: echo "Déploiement prêt (Kubernetes / VM / SSH)"