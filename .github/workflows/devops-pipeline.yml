name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

  docker:
    name: Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t fatimaezahraafras/hapi-fhir-jpaserver:latest .

      # 🔐 Scan sécurité avec Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fatimaezahraafras/hapi-fhir-jpaserver:latest
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      # 📊 Calcul du nombre de vulnérabilités
      - name: Calcul du nombre de vulnérabilités
        run: |
          echo "🔎 Calcul des vulnérabilités HIGH et CRITICAL..."
          VULN_COUNT=$(jq '
            [.Results[]? 
              | .Vulnerabilities[]? 
              | select(.Severity=="HIGH" or .Severity=="CRITICAL")
            ] | length
          ' trivy-report.json)

          echo "trivy_vulnerabilities_total $VULN_COUNT" > metrics.prom
          echo "Nombre de vulnérabilités détectées : $VULN_COUNT"

      # 🚀 Push métrique vers Prometheus Pushgateway
      - name: Start Pushgateway
        run: |
          echo "🟢 Démarrage de Pushgateway local..."
          docker run -d -p 9091:9091 --name pushgateway prom/pushgateway

      - name: Push Trivy metrics
        run: |
          echo "🔎 Envoi des métriques Trivy vers Pushgateway..."
          curl --data-binary @metrics.prom http://127.0.0.1:9091/metrics/job/trivy_scan

      - name: Stop Pushgateway
        if: always()
        run: |
          echo "🛑 Arrêt de Pushgateway..."
          docker stop pushgateway
          docker rm pushgateway

      # 📦 Sauvegarde du rapport Trivy
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Push Docker image
        run: |
          docker push fatimaezahraafras/hapi-fhir-jpaserver:latest

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deployment step
        run: |
          echo "Déploiement prêt (Kubernetes / VM / SSH)"