name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

  security-scan:
    name: Docker Build & Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci         
         
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.sarif

      - name: Download Dependency Check
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          VERSION=9.2.0
          curl -L -o dependency-check.zip \
            "https://github.com/jeremylong/DependencyCheck/releases/download/v${VERSION}/dependency-check-${VERSION}.zip"
          # Vérifier que le fichier ZIP est correct
          ls -lh dependency-check.zip
          unzip -q dependency-check.zip
          rm dependency-check.zip

      - name: Run Dependency Check
        continue-on-error: true
        run: |
          VERSION=9.2.0
          ./dependency-check-${VERSION}/bin/dependency-check.sh \
            --project "hapi-fhir" \
            --scan . \
            --format HTML \
            --out dependency-check-report \
            --noupdate

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t fatimaezahraafras/hapi-fhir-jpaserver:latest .

      - name: Scan Docker image with Trivy (Security Gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fatimaezahraafras/hapi-fhir-jpaserver:latest
          severity: CRITICAL
          format: json
          output: trivy-report.json
          exit-code: 0

      - name: Generate vulnerability metrics CSV 
        run: |
          DATE=$(date +%Y-%m-%d)
          COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)

          echo "date,vulnerabilities" > vuln_metrics.csv
          echo "$DATE,$COUNT" >> vuln_metrics.csv

          echo "Fichier généré :"
          cat vuln_metrics.csv

      - name: Upload security metrics
        uses: actions/upload-artifact@v4
        with:
          name: security-metrics
          path: vuln_metrics.csv

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Push Docker image
        run: docker push fatimaezahraafras/hapi-fhir-jpaserver:latest

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deployment step
        run: echo "Déploiement prêt (Kubernetes / VM / SSH)"