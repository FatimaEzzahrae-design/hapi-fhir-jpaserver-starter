name: DevOps Pipeline

# Déclenchement du pipeline sur push ou pull request vers main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Cacher le cache Maven pour accélérer les builds
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4️⃣ Build Maven complet
      - name: Build with Maven
        run: mvn clean install -B

      # 5️⃣ Lancer les tests unitaires et d’intégration
      - name: Run tests
        run: mvn test -B

      # 6️⃣ Build Docker image
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hapifhir-jpaserver:latest

      # 7️⃣ Optionnel : Vérifier que l’image Docker fonctionne
      - name: Test Docker image
        run: |
          docker run --rm hapifhir-jpaserver:latest java -version