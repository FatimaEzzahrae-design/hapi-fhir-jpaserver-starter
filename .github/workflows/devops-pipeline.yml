name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

  docker:
    name: Build, Scan & Save Trivy Metrics
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t fatimaezahraafras/hapi-fhir-jpaserver:latest .

      # 🔐 Scan sécurité avec Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fatimaezahraafras/hapi-fhir-jpaserver:latest
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      # 📊 Calcul du nombre de vulnérabilités et sauvegarde CSV
      - name: Calculate Trivy vulnerabilities and save CSV
        run: |
          echo "🔎 Calcul des vulnérabilités HIGH et CRITICAL..."
          VULN_COUNT=$(jq '
            [.Results[]? 
              | .Vulnerabilities[]? 
              | select(.Severity=="HIGH" or .Severity=="CRITICAL")
            ] | length
          ' trivy-report.json)

          echo "Nombre de vulnérabilités détectées : $VULN_COUNT"

          # Crée ou ajoute le CSV
          if [ ! -f trivy_metrics.csv ]; then
            echo "date,vuln_count" > trivy_metrics.csv
          fi
          echo "$(date +%Y-%m-%dT%H:%M:%S),$VULN_COUNT" >> trivy_metrics.csv

      # 📦 Sauvegarde du rapport Trivy
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      # 📦 Upload des métriques CSV pour Grafana
      - name: Upload Trivy metrics CSV
        uses: actions/upload-artifact@v4
        with:
          name: trivy-metrics
          path: trivy_metrics.csv

      - name: Push Docker image
        run: |
          docker push fatimaezahraafras/hapi-fhir-jpaserver:latest

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deployment step
        run: |
          echo "Déploiement prêt (Kubernetes / VM / SSH)"