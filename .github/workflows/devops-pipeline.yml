name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

  docker-and-trivy:
    name: Build, Scan Docker Image & Generate CSV
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t fatimaezahraafras/hapi-fhir-jpaserver:latest .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fatimaezahraafras/hapi-fhir-jpaserver:latest
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      # 🔄 Convert JSON Trivy report to CSV
      - name: Generate CSV from Trivy JSON
        run: |
          VULN_COUNT=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy-report.json)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "date,vuln_count" > trivy_metrics.csv
          echo "$DATE,$VULN_COUNT" >> trivy_metrics.csv
          cat trivy_metrics.csv

      - name: Upload CSV and JSON as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-metrics
          path: |
            trivy_metrics.csv
            trivy-report.json

      - name: Push Docker image
        run: docker push fatimaezahraafras/hapi-fhir-jpaserver:latest

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: docker-and-trivy
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deployment step
        run: echo "Déploiement prêt (Kubernetes / VM / SSH)"